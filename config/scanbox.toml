[app]
default_profile = "balanced"
report_output_dir = "reports"
verbose = false

[timeouts]
hash_seconds = 10
clamav_seconds = 60
yara_seconds = 30
capa_seconds = 90

[engines.clamav]
enabled = true
executable = "C:\\Tools\\ClamAV\\clamscan.exe"
database_dir = ".local-tools\\clamav\\db"

[engines.yara]
enabled = true
rules_dir = "rules\\yara\\bundled"
manifest = "rules\\yara\\manifest.json"

[engines.capa]
enabled = true
executable = "C:\\Tools\\capa\\capa.exe"
rules_dir = "rules\\capa\\bundled"
manifest = "rules\\capa\\manifest.json"

[quarantine]
directory = "quarantine"

[directory_scan]
ignored_directory_names = [".git", ".venv", "__pycache__"]
ignored_file_names = []
ignored_suffixes = []
ignored_patterns = []
zip_expansion_enabled = true
max_archive_expansion_depth = 1
max_archive_member_count = 256
max_archive_total_bytes = 134217728
