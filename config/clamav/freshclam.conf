##
## ScanBox example freshclam configuration.
## Copy this file to freshclam.local.conf on each workstation and update
## DatabaseDirectory to the real local database path before running freshclam.
##

DatabaseDirectory "C:\\Users\\YOUR_NAME\\path\\to\\antivirus_program\\.local-tools\\clamav\\db"
DatabaseMirror database.clamav.net
MaxAttempts 3
Checks 12
CompressLocalDatabase no
